<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#000000" />
  <title>Chyako Cutz</title>
  <link rel="icon" href="assets/logo.png" />
  <link rel="apple-touch-icon" href="assets/logo.png" />
  <link rel="manifest" href="manifest.json" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" />

  <style>
    html, body {
      margin: 0; padding: 0;
      background: #000;
      min-height: 100vh;
      font-family: 'Space Grotesk', 'Inter', system-ui, sans-serif;
      color: #f4ebd6;
      overflow: hidden;
    }
    #root { width: 100%; min-height: 100vh; }
    .boot {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column;
      background: #000;
    }
    .boot-logo {
      width: 100px; height: 100px;
      object-fit: contain;
      margin-bottom: 20px;
      animation: boot-fade 0.7s ease both;
    }
    .boot-name {
      font-family: 'Pirata One', serif;
      font-size: 34px;
      letter-spacing: 0.08em;
      color: #e8c268;
      animation: boot-fade 0.7s ease 0.1s both;
    }
    .boot-sub {
      font-family: 'Space Grotesk', 'Inter', sans-serif;
      font-size: 11px;
      letter-spacing: 0.22em;
      color: rgba(232,194,104,0.45);
      margin-top: 6px;
      margin-bottom: 36px;
      animation: boot-fade 0.7s ease 0.2s both;
    }
    .boot-spinner {
      width: 26px; height: 26px;
      border: 1.5px solid rgba(232, 194, 104, 0.15);
      border-top-color: #e8c268;
      border-radius: 50%;
      animation: bspin 0.9s linear infinite;
    }
    @keyframes bspin { to { transform: rotate(360deg); } }
    @keyframes boot-fade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div id="root">
    <div class="boot">
      <img class="boot-logo" src="assets/logo.png" alt="Chyako Cutz"/>
      <div class="boot-name">CHYAKO CUTZ</div>
      <div class="boot-sub">SUTTON · SM1</div>
      <div class="boot-spinner"></div>
    </div>
  </div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <!-- Firebase v9 Compat -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-messaging-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-functions-compat.js"></script>
  <script src="firebase-config.js"></script>

  <!-- Data + Styles -->
  <script src="data.js"></script>
  <script src="app-styles.js"></script>
  <script src="app-styles-extra.js"></script>

  <!-- App pieces (order matters — shell last) -->
  <script type="text/babel" src="app-auth.jsx"></script>
  <script type="text/babel" src="app-home.jsx"></script>
  <script type="text/babel" src="app-bookings.jsx"></script>
  <script type="text/babel" src="app-account.jsx"></script>
  <script type="text/babel" src="app-book-sheet.jsx"></script>
  <script type="text/babel" src="app-owner.jsx"></script>
  <script type="text/babel" src="app-shell.jsx"></script>

  <script type="text/babel">
    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { err: null }; }
      static getDerivedStateFromError(err) { return { err }; }
      render() {
        if (this.state.err) {
          return (
            <div style={{ position:'fixed', inset:0, background:'#0a0806', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'32px', textAlign:'center', fontFamily:'Space Grotesk, sans-serif' }}>
              <div style={{ fontSize:32, marginBottom:12 }}>✂</div>
              <div style={{ color:'#e8c268', fontWeight:700, fontSize:13, letterSpacing:'0.15em', marginBottom:8 }}>SOMETHING WENT WRONG</div>
              <div style={{ color:'rgba(244,235,214,0.55)', fontSize:12, marginBottom:28, maxWidth:260 }}>{this.state.err.message}</div>
              <button onClick={() => window.location.reload()} style={{ background:'#e8c268', color:'#000', border:'none', padding:'12px 28px', borderRadius:100, fontFamily:'Space Grotesk,sans-serif', fontWeight:700, fontSize:12, letterSpacing:'0.15em', cursor:'pointer' }}>RELOAD APP</button>
            </div>
          );
        }
        return this.props.children;
      }
    }

    const Root = () => (
      <div className="stage">
        <style>{window.appStyles}</style>
        <style>{window.appStylesExtra}</style>
        <div className="phone">
          <ErrorBoundary>
            <window.AppShell/>
          </ErrorBoundary>
        </div>
      </div>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
  </script>
</body>
</html>
